services:
  - type: web
    name: infengine
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Insert your Gemini API Key here (starts with AIzaSy)"
